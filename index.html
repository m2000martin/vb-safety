<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VB SAFETY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{--soot:#0B0D14;--uv:#7A4DF0;--emit:#8FE3FF;--ember:#E8843C;--bone:#E9EBF2;--mute:#5F667A}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--soot);color:var(--bone);font-family:"IBM Plex Mono",monospace;
       -webkit-font-smoothing:antialiased;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:0 0 auto 0;height:2px;z-index:5;
       background:linear-gradient(90deg,var(--ember),var(--uv) 55%,var(--emit));opacity:.85}

  .stage{position:fixed;inset:0;z-index:0;pointer-events:none}
  .field{position:absolute;inset:-10%;background-repeat:repeat;
    -webkit-mask-image:radial-gradient(circle 300px at var(--x,50%) var(--y,45%),#000 0%,rgba(0,0,0,.55) 45%,transparent 72%);
            mask-image:radial-gradient(circle 300px at var(--x,50%) var(--y,45%),#000 0%,rgba(0,0,0,.55) 45%,transparent 72%)}
  .lamp{position:absolute;inset:-10%;mix-blend-mode:screen;
    background:radial-gradient(circle 360px at var(--x,50%) var(--y,45%),rgba(122,77,240,.28) 0%,rgba(122,77,240,.10) 42%,transparent 70%)}
  .shade{position:absolute;inset:-25%;filter:blur(70px);opacity:.55;will-change:transform}
  .shade i{position:absolute;display:block;border-radius:50%}
  .s1{width:52vw;height:52vw;left:4%;top:8%;background:radial-gradient(circle,rgba(122,77,240,.34),transparent 66%);
      animation:drift1 34s ease-in-out infinite}
  .s2{width:46vw;height:46vw;right:2%;top:30%;background:radial-gradient(circle,rgba(143,227,255,.16),transparent 66%);
      animation:drift2 44s ease-in-out infinite}
  .s3{width:40vw;height:40vw;left:30%;bottom:-6%;background:radial-gradient(circle,rgba(232,132,60,.13),transparent 66%);
      animation:drift3 52s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate3d(0,0,0) scale(1)}33%{transform:translate3d(14vw,9vh,0) scale(1.14)}66%{transform:translate3d(-6vw,16vh,0) scale(.92)}}
  @keyframes drift2{0%,100%{transform:translate3d(0,0,0) scale(1.06)}40%{transform:translate3d(-15vw,-11vh,0) scale(.9)}70%{transform:translate3d(-4vw,12vh,0) scale(1.18)}}
  @keyframes drift3{0%,100%{transform:translate3d(0,0,0) scale(.95)}50%{transform:translate3d(11vw,-14vh,0) scale(1.2)}}
  .vignette{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 0%,transparent 40%,rgba(11,13,20,.85) 100%)}

  .wrap{position:relative;z-index:1;min-height:100svh;display:flex;flex-direction:column;
        padding:clamp(20px,4vw,44px);gap:clamp(24px,6vh,64px)}
  .mark{font-family:"Archivo Expanded",sans-serif;font-weight:700;
        font-size:clamp(15px,1.5vw,19px);letter-spacing:.22em}
  main{flex:1;display:flex;align-items:center;justify-content:center;width:100%}
  h1{margin:0;text-align:center}
  .rotator{display:grid;place-items:center}
  .rotator>span{grid-area:1/1;font-family:"Archivo Expanded",sans-serif;font-weight:600;
    font-size:clamp(2.05rem,5.4vw,4.9rem);line-height:1.02;letter-spacing:-.02em;max-width:15ch;
    color:#fff;text-shadow:0 0 42px rgba(143,227,255,.20),0 0 90px rgba(122,77,240,.14);
    opacity:0;filter:blur(10px);transform:scale(1.015);
    transition:opacity 1.5s cubic-bezier(.4,0,.2,1),filter 1.5s cubic-bezier(.4,0,.2,1),transform 1.9s cubic-bezier(.4,0,.2,1);
    text-wrap:balance;will-change:opacity,filter}
  .rotator>span.on{opacity:1;filter:blur(0);transform:none}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

  footer{display:flex;justify-content:center;
    font-size:12px;letter-spacing:.05em;color:var(--mute)}
  footer a{color:var(--mute);text-decoration:none;border-bottom:1px solid transparent;transition:.25s}
  footer a:hover,footer a:focus-visible{color:var(--bone);border-color:var(--ember)}
  :focus-visible{outline:2px solid var(--emit);outline-offset:3px}


  @media (max-width:640px){.rotator>span{max-width:none}}
  @media (prefers-reduced-motion:reduce){
    .rotator>span{transition:opacity .3s;filter:none;transform:none}
    .shade i{animation:none}
  }
</style>
</head>
<body>

<div class="stage" aria-hidden="true">
  <div class="shade"><i class="s1"></i><i class="s2"></i><i class="s3"></i></div>
  <div class="field" id="field"></div>
  <div class="lamp" id="lamp"></div>
  <div class="vignette"></div>
</div>

<div class="wrap">
  <div class="mark">VB SAFETY</div>

  <main>
    <h1>
      <span class="sr">Firefighters' health technological revolution. La santé des pompiers révolutionnée.</span>
      <span class="rotator" aria-hidden="true">
        <span class="on" lang="en">Firefighters' health technological revolution</span>
        <span lang="fr">La santé des pompiers révolutionnée</span>
      </span>
    </h1>
  </main>

  <footer>
    <a href="mailto:contact@vb-safety.com">contact@vb-safety.com</a>
  </footer>
</div>


<script>
(function(){
  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  var c = document.createElement('canvas'), S = 620;
  c.width = c.height = S;
  var g = c.getContext('2d');
  for (var i=0;i<850;i++){
    g.beginPath();
    g.arc(Math.random()*S, Math.random()*S, Math.random()*1.6+0.4, 0, 6.2832);
    g.fillStyle = 'rgba(' + (Math.random()>.78 ? '183,150,255' : '143,227,255') + ',' + (Math.random()*0.55+0.08) + ')';
    g.fill();
  }
  document.getElementById('field').style.backgroundImage = 'url(' + c.toDataURL() + ')';

  var layers=[document.getElementById('field'),document.getElementById('lamp')];
  var tx=innerWidth*.5, ty=innerHeight*.45, cx=tx, cy=ty, t=0, pointer=false;
  addEventListener('pointermove',function(e){pointer=true;tx=e.clientX;ty=e.clientY;},{passive:true});
  addEventListener('pointerleave',function(){pointer=false;},{passive:true});
  function frame(){
    t+=0.0042;
    if(!pointer){tx=innerWidth*(0.5+0.30*Math.sin(t));ty=innerHeight*(0.46+0.26*Math.sin(t*1.37+1.1));}
    cx+=(tx-cx)*0.045; cy+=(ty-cy)*0.045;
    for(var k=0;k<2;k++){layers[k].style.setProperty('--x',cx+'px');layers[k].style.setProperty('--y',cy+'px');}
    requestAnimationFrame(frame);
  }
  if(reduce){layers.forEach(function(el){el.style.setProperty('--x','50%');el.style.setProperty('--y','45%');});}
  else{frame();}

  var lines=document.querySelectorAll('.rotator>span'), n=0;
  setInterval(function(){
    lines[n].classList.remove('on');
    n=(n+1)%lines.length;
    lines[n].classList.add('on');
  }, reduce?5000:3200);
})();
</script>
</body>
</html>
